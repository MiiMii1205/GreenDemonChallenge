[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "OracleTeam"
name = "GreenDemonChallenge"
description = "A wild Green Demon has appeared! Can you take the challenge and climb all the way to the PEAK?"
websiteUrl = "https://github.com/MiiMii1205/GreenDemonChallenge" # TODO: Add a link to your mod repository here (optional)
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_PEAK = "5.4.2403"
Snosz-PhotonCustomPropsUtils = "1.1.0"
PEAKModding-PEAKLib_Core = "1.7.0"
PEAKModding-SoftDependencyFix = "1.0.0"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/GreenDemonChallenge/release/com.github.MiiMii1205.GreenDemonChallenge.dll"
target = "plugins/"

[[build.copy]]
source = "../../src/GreenDemonChallenge/Bundles"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

[[build.copy]]
source = "../../src/GreenDemonChallenge/GreenDemonChallengeLocalizedText.csv"
target = "plugins/"

# The following config options only apply when using TCLI to publish to Thunderstore directly:

[publish]
# See communities at:
# https://thunderstore.io/api/experimental/community/
communities = [ "peak", ]

[publish.categories]
# See categories at:
# https://thunderstore.io/api/experimental/community/peak/category/
peak = [ "mods", "all", "misc"]
